# nginx para La Lupa con subdominio de analítica.
# Reemplaza /etc/nginx/conf.d/lalupa2.conf (el que crea deploy/setup.sh).
# Sustituye  lalupa.mx  por tu dominio real y recarga:  nginx -t && systemctl reload nginx
#
# Pensado para ir DETRÁS de Cloudflare (proxy naranja activado):
#   - Cloudflare termina el TLS y reenvía en :80.
#   - La IP real del visitante llega en 'CF-Connecting-IP' y el país en
#     'CF-IPCountry' — la app ya los lee (src/lib/metricas.ts). nginx los
#     reenvía tal cual, no hay que hacer nada extra.
# Si NO usas Cloudflare, monta TLS con certbot (ver README-analitica.md).

# — Buscador + panel propio (/admin/stats) —
server {
  listen 80;
  server_name lalupa.mx www.lalupa.mx;

  location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

# — Umami (analítica de tráfico) en su propio subdominio —
server {
  listen 80;
  server_name stats.lalupa.mx;

  location / {
    proxy_pass http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
